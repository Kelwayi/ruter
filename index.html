<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Avganger 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:      #ff8fab;
    --pink-lt:   #ffc8dd;
    --pink-bg:   #fff0f5;
    --lavender:  #c8b6e2;
    --mint:      #b5ead7;
    --peach:     #ffcba4;
    --yellow:    #fde68a;
    --sky:       #bde0fe;
    --white:     #ffffff;
    --text:      #5c3d5e;
    --text-soft: #b49bbf;
    --card-bg:   #fff8fb;
    --shadow:    rgba(255, 143, 171, 0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--pink-bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 28px 32px;
    overflow: hidden;
    position: relative;
  }

  /* Floating background stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .star {
    position: absolute;
    font-size: 18px;
    animation: floatStar linear infinite;
    opacity: 0.35;
  }
  @keyframes floatStar {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.35; }
    90%  { opacity: 0.35; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Wavy top border */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: repeating-linear-gradient(
      90deg,
      var(--pink) 0px, var(--pink) 20px,
      var(--lavender) 20px, var(--lavender) 40px,
      var(--mint) 40px, var(--mint) 60px,
      var(--peach) 60px, var(--peach) 80px,
      var(--yellow) 80px, var(--yellow) 100px,
      var(--sky) 100px, var(--sky) 120px
    );
    z-index: 200;
  }

  /* ---- HEADER ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    position: relative;
    z-index: 10;
  }

  .header-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .station-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-soft);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--pink);
    line-height: 1;
    text-shadow: 3px 3px 0px var(--pink-lt);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .h1-emoji {
    animation: wiggle 2.5s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-8deg); }
    50%       { transform: rotate(8deg); }
  }

  .clock-box {
    background: var(--white);
    border: 3px solid var(--pink-lt);
    border-radius: 24px;
    padding: 12px 24px;
    box-shadow: 0 4px 16px var(--shadow);
    text-align: center;
  }

  .clock {
    font-family: 'Nunito', sans-serif;
    font-size: 44px;
    font-weight: 900;
    color: var(--pink);
    letter-spacing: 0.03em;
    line-height: 1;
  }

  .clock-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-top: 2px;
  }

  /* ---- COLUMN HEADERS ---- */
  .table-header {
    display: grid;
    grid-template-columns: 80px 1fr 180px;
    padding: 0 20px 10px;
    gap: 16px;
    position: relative;
    z-index: 10;
  }

  .table-header span {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-soft);
  }

  /* ---- ROWS ---- */
  #departures {
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    z-index: 10;
  }

  .row {
    display: grid;
    grid-template-columns: 80px 1fr 180px;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--card-bg);
    border: 2.5px solid var(--pink-lt);
    border-radius: 20px;
    box-shadow: 0 4px 14px var(--shadow);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    opacity: 0;
    transform: scale(0.9) translateY(10px);
    position: relative;
    transition: box-shadow 0.2s;
  }

  .row:nth-child(1) { animation-delay: 0.00s; border-color: var(--pink);     }
  .row:nth-child(2) { animation-delay: 0.06s; border-color: var(--lavender); }
  .row:nth-child(3) { animation-delay: 0.12s; border-color: var(--mint);     }
  .row:nth-child(4) { animation-delay: 0.18s; border-color: var(--peach);    }
  .row:nth-child(5) { animation-delay: 0.24s; border-color: var(--yellow);   }
  .row:nth-child(6) { animation-delay: 0.30s; border-color: var(--sky);      }
  .row:nth-child(7) { animation-delay: 0.36s; border-color: var(--pink-lt);  }
  .row:nth-child(8) { animation-delay: 0.42s; border-color: var(--lavender); }

  @keyframes popIn {
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Line badge — rotating border colors */
  .line-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--pink);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    width: 62px;
    height: 42px;
    border-radius: 14px;
    letter-spacing: 0.03em;
    flex-shrink: 0;
    box-shadow: 0 3px 0 rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }

  .row:nth-child(2) .line-badge { background: var(--lavender); }
  .row:nth-child(3) .line-badge { background: var(--mint);     color: var(--text); }
  .row:nth-child(4) .line-badge { background: var(--peach);    color: var(--text); }
  .row:nth-child(5) .line-badge { background: var(--yellow);   color: var(--text); }
  .row:nth-child(6) .line-badge { background: var(--sky);      color: var(--text); }
  .row:nth-child(7) .line-badge { background: var(--pink-lt);  color: var(--text); }
  .row:nth-child(8) .line-badge { background: var(--lavender); }

  .destination {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .time-cell {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
  }

  .time-abs {
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: 0.03em;
  }

  .time-rel {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-soft);
    background: var(--pink-bg);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .time-rel.soon {
    color: #3d9970;
    background: #e8fff3;
  }

  .time-rel.now {
    color: #fff;
    background: var(--pink);
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ---- FOOTER ---- */
  footer {
    margin-top: auto;
    padding-top: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10;
  }

  .footer-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-soft);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .heart {
    display: inline-block;
    color: var(--pink);
    animation: heartbeat 1.4s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14%       { transform: scale(1.3); }
    28%       { transform: scale(1); }
    42%       { transform: scale(1.2); }
    70%       { transform: scale(1); }
  }

  .loading {
    color: var(--text-soft);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 40px 20px;
    text-align: center;
    animation: bounce 1s ease-in-out infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-8px); }
  }

  .error {
    color: var(--pink);
    font-size: 18px;
    font-weight: 700;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- Floating stars/sparkles background -->
<div class="stars" id="stars"></div>

<header>
  <div class="header-left">
    <div class="station-name">🌸 <span id="stop-name">Holdeplass</span> 🌸</div>
    <h1><span class="h1-emoji">🚌</span> Neste avganger</h1>
  </div>
  <div class="clock-box">
    <div class="clock" id="clock">--:--:--</div>
    <div class="clock-label">Tid nå ✨</div>
  </div>
</header>

<div class="table-header">
  <span>Linje 🎀</span>
  <span>Destinasjon 🗺️</span>
  <span style="text-align:right">Avgang ⏰</span>
</div>

<div id="departures">
  <div class="loading">✨ Laster avganger… ✨</div>
</div>

<footer>
  <div class="footer-label">
    <span class="heart">♥</span> Live · oppdateres hvert 15s
  </div>
  <div class="footer-label" id="last-updated"></div>
</footer>

<script>
  const stopId = "NSR:StopPlace:6542";

  // Spawn floating sparkles
  const starChars = ['✦','✧','⋆','·','✩','★','♡','✿','◌'];
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = starChars[Math.floor(Math.random() * starChars.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.fontSize = (12 + Math.random() * 18) + 'px';
    s.style.animationDuration = (12 + Math.random() * 20) + 's';
    s.style.animationDelay = (-Math.random() * 25) + 's';
    starsEl.appendChild(s);
  }

  // Live clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  function relativeTime(depTime) {
    const diff = Math.floor((depTime - Date.now()) / 1000 / 60);
    if (diff <= 0) return { text: '🚨 Nå!', cls: 'now' };
    if (diff === 1) return { text: '1 min 💨', cls: 'soon' };
    if (diff <= 5) return { text: `${diff} min 🏃`, cls: 'soon' };
    return { text: `${diff} min`, cls: '' };
  }

  async function loadDepartures() {
    const container = document.getElementById('departures');
    try {
      const response = await fetch("https://api.entur.io/journey-planner/v3/graphql", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "ET-Client-Name": "school-infoskjerm"
        },
        body: JSON.stringify({
          query: `{
            stopPlace(id: "${stopId}") {
              name
              estimatedCalls(timeRange: 3600, numberOfDepartures: 8) {
                expectedDepartureTime
                destinationDisplay { frontText }
                serviceJourney { line { publicCode } }
              }
            }
          }`
        })
      });

      const data = await response.json();
      const stop = data.data.stopPlace;

      if (stop.name) {
        document.getElementById('stop-name').textContent = stop.name;
      }

      container.innerHTML = '';

      stop.estimatedCalls.forEach(call => {
        const depDate = new Date(call.expectedDepartureTime);
        const absTime = depDate.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
        const rel = relativeTime(depDate);

        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <div class="line-badge">${call.serviceJourney.line.publicCode}</div>
          <div class="destination">${call.destinationDisplay.frontText}</div>
          <div class="time-cell">
            <div class="time-abs">${absTime}</div>
            <div class="time-rel ${rel.cls}">${rel.text}</div>
          </div>
        `;
        container.appendChild(row);
      });

      document.getElementById('last-updated').textContent =
        '✨ Oppdatert ' + new Date().toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    } catch (e) {
      container.innerHTML = `<div class="error">😿 Kunne ikke laste avganger. Sjekk tilkobling!</div>`;
      console.error(e);
    }
  }

  loadDepartures();
  setInterval(loadDepartures, 15000);
</script>
</body>
</html>
